name: fodwa
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
#  for verify account
  pin_code_fields: ^8.0.1

  # UI Enhancement
  flutter_svg: ^2.0.9            # Vector graphics
  google_fonts: ^6.1.0
  #for localization
  easy_localization: ^3.0.8
  #  for dependency injection
  get_it: ^9.0.5
  #  for  animation
  skeletonizer: ^2.1.0+1
  shimmer_animation: ^2.2.2
  font_awesome_flutter: ^10.10.0
  visibility_detector: ^0.4.0+2
  animate_do: ^4.2.0
  smooth_page_indicator: ^1.2.1
  flutter_animate: ^4.5.2
  animations: ^2.1.0
  flutter_staggered_animations: ^1.1.1
  motion: ^2.0.1
  lottie: ^3.3.2
  #  for cashing
  flutter_secure_storage: ^9.2.4
  get_storage: ^2.1.1
  slide_to_act: ^2.0.2
  #  for video
  youtube_player_iframe: ^5.2.1
  # for location
  geolocator: ^14.0.2

  geocoding: ^4.0.0
  google_maps_flutter_android: ^2.18.6
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  google_maps_flutter: ^2.13.1
  # For image picking
  image_picker: ^1.0.4
  # For drop down
  dropdown_button2: ^2.3.9
  #  for drawer
  flutter_zoom_drawer: ^3.2.0
  #  for bottomNav
  #  for state management
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  equatable: ^2.0.7
  #  for check internet
  flutter_offline: ^6.0.0
# for design
  dotted_border: ^3.1.0
  #  for testing
  device_info_plus: ^10.1.0
  # for call Api's
  dio: ^5.9.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.0.0
  #  for firebase
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  #  for contry icons
  intl_phone_number_input: ^0.7.5
  country_flags: ^4.1.0
  #  for app logo
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.5
dev_dependencies:
  device_preview: ^1.3.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/fodwa 1.png"
  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env
    - assets/translations/
    - assets/images/
    - assets/icons/
